# PowerShell module/pipeline logging observation catalog (EventID 4103).
#
# Calibrated against SigmaHQ at commit 03412947a2d6. 34 rules combined.
# The EventID 4103 channel logs pipeline execution details — noisier than
# script-block logging, but useful for catching reflective .NET loads and
# downloadstring-style behavior from Windows PowerShell v2 compatibility
# abuses.

id: ps_module
label: "A PowerShell module or pipeline executed"
description: "Use when PowerShell pipeline/module execution was logged via EventID 4103 (module logging)."
category_group: powershell_and_scripting
logsource:
    product: windows
    category: ps_module
    service: powershell
platforms:
    - id: windows
      product: windows
      tier: primary
synonyms:
    - "powershell module"
    - "eventid 4103"
    - "ps module logging"
    - "powershell pipeline"

fields:
    - name: Payload
      label: "Pipeline payload"
      type: string
      default_modifier: contains
      allowed_modifiers: [contains, all, re, endswith, startswith, exact]
      example: "System.Reflection.Assembly]::Load"
      note: "Arguments and output captured by the module-logging channel. Watch for reflective .NET loads, Add-Type, and DownloadString-style patterns."

    - name: ContextInfo
      label: "Invocation context"
      type: string
      default_modifier: contains
      allowed_modifiers: [contains, all, endswith, startswith, exact]
      example: "HostApplication=powershell.exe -EncodedCommand"
      note: "Host, user, command-name, and other execution-context metadata in `key=value` form. Useful for identifying the launching command and host process."
