id: registry_event
label: A registry key, value, or stream was created, renamed, or deleted
description: Use for Sysmon Event ID 12/14 (RegistryEvent — create/delete and key rename). Distinct from registry_set (EID 13) which fires on value modifications.
category_group: file_and_registry
logsource:
  product: windows
  category: registry_event
platforms:
- id: windows
  product: windows
  tier: primary
synonyms:
- registry create
- registry delete
- registry key rename
- Sysmon EID 12
- Sysmon EID 14
- HKLM\Run
- registry persistence
fields:
- name: TargetObject
  label: Registry path (key or value)
  type: string
  default_modifier: contains
  allowed_modifiers:
  - contains
  - startswith
  - endswith
  - exact
  - re
  example: 'HKLM\Software\Microsoft\Windows\CurrentVersion\Run\evil'
  note: "Full registry path including hive (HKLM, HKCU, HKU). Sysmon emits values with the hive prefix; common autoruns paths include \\Software\\Microsoft\\Windows\\CurrentVersion\\Run and \\Services\\."
- name: Details
  label: Value details (for stream/key info)
  type: string
  default_modifier: exact
  allowed_modifiers:
  - exact
  - contains
  - startswith
  - endswith
  - re
  example: '(Empty)'
  note: "Sysmon-rendered value content for create/delete events. Often '(Empty)' for key creation; for stream events it's the stream data."
- name: Image
  label: Executable path
  type: path
  default_modifier: endswith
  allowed_modifiers:
  - endswith
  - contains
  - startswith
  - exact
  - re
  example: '\reg.exe'
  note: "Process that touched the registry. reg.exe / regedit.exe are common explicit tools; PowerShell, WMIC, and trusted-installer abuse are also high-signal."
- name: EventType
  label: Registry operation type
  type: string
  default_modifier: exact
  allowed_modifiers:
  - exact
  - contains
  - startswith
  - endswith
  - re
- name: NewName
  label: New key/value name (after rename)
  type: string
  default_modifier: exact
  allowed_modifiers:
  - exact
  - contains
  - startswith
  - endswith
  - re
- name: EventID
  label: Event ID
  type: int
