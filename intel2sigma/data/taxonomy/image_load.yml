# Image-load observation catalog (Windows, Sysmon EventID 7).
#
# Calibrated against SigmaHQ at commit 03412947a2d6. 122 rules combined.
# ImageLoaded (the DLL or module being loaded) is near-universal; Image
# (the loading process) is important context for narrowing.

id: image_load
label: "A process loaded a library or module"
description: "Use when a suspicious DLL or module was loaded into a process."
category_group: process_and_execution
logsource:
    category: image_load
platforms:
    - id: windows
      product: windows
      tier: primary
synonyms:
    - "dll loaded"
    - "module loaded"
    - "library loaded"
    - "image loaded"

fields:
    - name: ImageLoaded
      label: "Loaded DLL or module path"
      type: path
      default_modifier: endswith
      allowed_modifiers: [endswith, startswith, contains, re, exact]
      example: '\amsi.dll'
      note: "Highest-signal field — most rules pivot on which DLL was loaded. Watch for DLL hijacking patterns (system32 names loaded from non-system paths) and direct loads of `amsi.dll`, `clr.dll`, `dbghelp.dll` into unusual processes."

    - name: Image
      label: "Loading process path"
      type: path
      default_modifier: endswith
      allowed_modifiers: [endswith, startswith, contains, re, exact]
      example: '\rundll32.exe'
      note: "The process loading the DLL. LOLbins (rundll32, regsvr32, mshta) loading payload DLLs is a high-signal pattern; pair with ImageLoaded to scope to the specific module."

    - name: Signed
      label: "Module is code-signed?"
      type: enum
      default_modifier: exact
      allowed_modifiers: [exact]
      values: ["true", "false"]
      example: "false"
      note: "'false' narrows to unsigned DLLs — common for malware payloads, especially when paired with a non-system load path."

    - name: SignatureStatus
      label: "Signature status"
      type: string
      default_modifier: exact
      allowed_modifiers: [exact, contains]
      example: "Valid"
      note: "'Valid', 'Expired', 'Invalid', etc. Useful for detecting revoked or self-signed drivers."

    - name: OriginalFileName
      label: "Original filename (PE metadata)"
      type: string
      default_modifier: exact
      allowed_modifiers: [exact, contains, endswith, startswith]

    - name: Description
      label: "File description (PE metadata)"
      type: string
      default_modifier: exact
      allowed_modifiers: [exact, contains, startswith]

    - name: Signature
      label: "Signer name"
      type: string
      default_modifier: exact
      allowed_modifiers: [exact, contains, startswith]
      note: "The Common Name of the signing certificate."

    - name: Hashes
      label: "File hashes"
      type: hash
      default_modifier: contains
      allowed_modifiers: [contains, exact]
      note: "Sigma expects a comma-separated string with algorithm prefixes (MD5=..., SHA256=...)."

    - name: CommandLine
      label: "Loading process command line"
      type: string
      default_modifier: contains
      allowed_modifiers: [contains, all, startswith, endswith, re, exact]

    - name: Product
      label: "Product name (PE metadata)"
      type: string
      default_modifier: exact
      allowed_modifiers: [exact, contains, endswith, startswith]

    - name: Company
      label: "Company name (PE metadata)"
      type: string
      default_modifier: exact
      allowed_modifiers: [exact, contains, endswith, startswith]
