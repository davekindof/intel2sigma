id: process_creation_macos
label: A macOS process was started
description: Use when malware or suspicious activity created a new process on macOS (ESF / EndpointSecurity events, or Sysmon-for-macOS where deployed).
category_group: process_and_execution
logsource:
  product: macos
  category: process_creation
platforms:
- id: macos
  product: macos
  tier: primary
synonyms:
- macOS process started
- ESF process exec
- EndpointSecurity exec
- macOS exec event
- mach process started
fields:
- name: Image
  label: Executable path
  type: path
  default_modifier: endswith
  allowed_modifiers:
  - endswith
  - contains
  - startswith
  - exact
  - re
  example: /usr/bin/osascript
  note: "macOS uses absolute Unix-style paths. Common LOLbins live in /usr/bin (osascript, curl, sh, bash, python3) and /usr/sbin. Apps live under /Applications/<App>.app/Contents/MacOS/."
- name: CommandLine
  label: Command line
  type: string
  default_modifier: contains
  allowed_modifiers:
  - contains
  - startswith
  - endswith
  - exact
  - re
  example: "osascript -e 'do shell script'"
  note: "Full argv joined with spaces. Watch for osascript+'do shell script' (privilege escalation idiom), curl piping into sh/bash, or base64-decoded payloads piped into shells."
- name: ParentImage
  label: Parent process path
  type: path
  default_modifier: endswith
  allowed_modifiers:
  - endswith
  - contains
  - startswith
  - exact
  - re
  example: /sbin/launchd
  note: "Common parents: /sbin/launchd (LaunchAgent/Daemon-spawned processes — persistence indicator), /Applications/Terminal.app/Contents/MacOS/Terminal, /usr/bin/sshd."
- name: OriginalFileName
  label: Bundle / signing identifier
  type: string
  default_modifier: contains
  allowed_modifiers:
  - contains
  - startswith
  - endswith
