# File-event observation catalog.
#
# Calibrated against SigmaHQ at commit 03412947a2d6. See docs/taxonomy.md
# for methodology. Linux auditd rules use a different field shape and
# live in file_event_linux.yml; the Windows + macOS variants share the
# Sysmon-flavor field names (TargetFilename, Image, CommandLine) and
# route through this file.
#
# TargetFilename is essentially universal in this category (99% of
# rules), followed by Image at ~50%. Everything beyond is a long tail
# of process-context fields used in a small minority of rules.
#
# Cross-platform: macOS Sysmon-for-mac and Windows Sysmon emit
# file_event records with the same field names. The L2-P2 audit
# confirmed all 5 unmatched macos file_event corpus rules use this
# same shape — adding macos as a secondary platform clears them
# without a sibling file. Path conventions differ at the value layer
# (macOS paths start with /, Windows with backslash) but that's the
# user's content, not catalog structure.

id: file_event
label: "A file was created or modified"
description: "Use when malware or suspicious activity wrote, renamed, or modified a file on disk."
category_group: file_and_registry
logsource:
    category: file_event
platforms:
    - id: windows
      product: windows
      tier: primary
    - id: macos
      product: macos
      tier: secondary
synonyms:
    - "file created"
    - "file written"
    - "file modified"
    - "file dropped"

fields:
    - name: TargetFilename
      label: "Target file path"
      type: path
      default_modifier: endswith
      allowed_modifiers: [endswith, contains, startswith, all, re, exact]
      example: '\AppData\Local\Temp\payload.exe'
      note: "Path suffix with a leading backslash matches filename regardless of directory."

    - name: Image
      label: "Writing process path"
      type: path
      default_modifier: endswith
      allowed_modifiers: [endswith, contains, startswith, re, exact]
      example: '\cscript.exe'
      note: "The executable that performed the write, not the file that was written."

    - name: CommandLine
      label: "Writing process command line"
      type: string
      default_modifier: contains
      allowed_modifiers: [contains, startswith, endswith, all, re, exact]
      example: "/c copy \\\\share\\evil.exe %TEMP%"
      note: "Full argv of the writing process. Combine with TargetFilename to filter on both 'what wrote' and 'what was written' — common pattern for staged-payload detection."

    - name: ParentImage
      label: "Parent of writing process"
      type: path
      default_modifier: endswith
      allowed_modifiers: [endswith, contains, startswith, re, exact]

    - name: User
      label: "User account"
      type: string
      default_modifier: contains
      allowed_modifiers: [contains, exact, endswith, startswith]

    - name: CreationUtcTime
      label: "File creation time"
      type: string
      default_modifier: startswith
      allowed_modifiers: [startswith, contains, exact]
      note: "Sysmon records this as an ISO-like timestamp. Use for timestomping detection."

    - name: Hashes
      label: "File hashes"
      type: string
      default_modifier: contains
      allowed_modifiers: [contains, exact]
      example: 'SHA256=1b62b7c2...'
      note: "Sysmon EventID 11 emits a comma-separated list (MD5=...,SHA256=...) when HashAlgorithms is configured. ``contains`` works against any one hash in the list."
