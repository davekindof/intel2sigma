# Per-heuristic severity + enablement.
#
# Shape:
#   heuristics:
#     <heuristic-id>:
#       severity: info | warn | critical
#       enabled:  true | false
#
# Re-tuning is a data-only PR per CLAUDE.md I-5. The catalog and the
# function signatures stay in code; what fires and how loudly stays here.
#
# v1.0 shipped an MVP set of 8 heuristics. v1.7 (in progress) is filling
# out the catalog — the remaining entries are tracked in
# docs/heuristics.md and added in semantic batches per ROADMAP §v1.7.

heuristics:
  # ----- IOC vs behavior --------------------------------------------------
  h-001:
    severity: warn
    enabled: true
  h-002:
    severity: info
    enabled: true
  h-003:
    severity: info
    enabled: true

  # ----- Overbroad selection ----------------------------------------------
  h-010:
    severity: warn
    enabled: true
  h-011:
    severity: warn
    enabled: true
  h-012:
    severity: warn
    enabled: true

  # ----- Lab artifacts ----------------------------------------------------
  h-021:
    severity: warn
    enabled: true
  h-022:
    severity: warn
    enabled: true

  # ----- Path specificity -------------------------------------------------
  h-030:
    severity: warn
    enabled: true
  h-032:
    severity: warn
    enabled: true

  # ----- Condition integrity ----------------------------------------------
  h-050:
    severity: critical
    enabled: true
  h-051:
    severity: warn
    enabled: true

  # ----- Metadata completeness --------------------------------------------
  h-060:
    severity: warn
    enabled: true
  h-061:
    severity: warn
    enabled: true
  h-062:
    severity: warn
    enabled: true
